<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskScheduler - 任务调度系统控制台</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --yellow: #d2991d;
            --purple: #a371f7;
            --orange: #db6d28;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        header h1 { font-size: 28px; color: var(--blue); }
        header p { color: var(--text-muted); margin-top: 5px; }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .label { color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
        .stat-card .value { font-size: 32px; font-weight: bold; margin: 8px 0; }
        .stat-card .value.green { color: var(--green); }
        .stat-card .value.blue { color: var(--blue); }
        .stat-card .value.yellow { color: var(--yellow); }
        .stat-card .value.purple { color: var(--purple); }
        .stat-card .value.red { color: var(--red); }

        /* 工具栏 */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text);
            background: var(--card-bg);
            transition: all 0.2s;
        }
        .btn:hover { border-color: var(--blue); color: var(--blue); }
        .btn-primary { background: #238636; border-color: #238636; color: #fff; }
        .btn-primary:hover { background: #2ea043; }

        /* 任务列表 */
        .task-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .task-table th, .task-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .task-table th { background: #1c2128; font-size: 13px; color: var(--text-muted); font-weight: 600; }

        /* 可点击行 */
        .task-row { cursor: pointer; transition: background 0.15s; }
        .task-row:hover { background: #1c2128; }
        .task-row.expanded { background: #1a2332; border-bottom: none; }
        .task-row td { font-size: 14px; }
        .task-row .expand-icon { display: inline-block; width: 16px; transition: transform 0.2s; font-size: 10px; }
        .task-row.expanded .expand-icon { transform: rotate(90deg); }

        /* 状态标签 */
        .status {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending  { background: #1c2a3a; color: var(--blue); }
        .status-running  { background: #2a1c00; color: var(--orange); }
        .status-done     { background: #0f2918; color: var(--green); }
        .status-failed   { background: #2a0c0c; color: var(--red); }
        .status-timeout  { background: #2a0c0c; color: var(--red); }
        .status-retrying { background: #2a1c00; color: var(--yellow); }

        /* 展开详情行 */
        .detail-row { display: none; }
        .detail-row.show { display: table-row; }
        .detail-row td {
            padding: 0 16px 20px 16px;
            background: #0d1a2a;
            border-bottom: 2px solid var(--border);
        }

        /* 生命周期时间线 */
        .lifecycle {
            display: flex;
            align-items: flex-start;
            gap: 0;
            padding: 16px 0;
            flex-wrap: wrap;
        }
        .lifecycle .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
            position: relative;
        }
        .lifecycle .step .dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--bg);
            z-index: 1;
            transition: all 0.3s;
        }
        .lifecycle .step .dot.active { border-color: var(--blue); background: var(--blue); }
        .lifecycle .step .dot.done { border-color: var(--green); background: var(--green); }
        .lifecycle .step .dot.fail { border-color: var(--red); background: var(--red); }
        .lifecycle .step .dot.warn { border-color: var(--yellow); background: var(--yellow); }
        .lifecycle .step .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            text-align: center;
            white-space: nowrap;
        }
        .lifecycle .step .time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            white-space: nowrap;
        }
        .lifecycle .arrow {
            display: flex;
            align-items: center;
            padding: 0 4px;
            margin-bottom: 20px;
            color: var(--border);
            font-size: 16px;
        }
        .lifecycle .arrow.passed { color: var(--green); }

        /* 详情面板 */
        .detail-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }
        .detail-panel .field {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
        }
        .detail-panel .field .f-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .detail-panel .field .f-value {
            font-size: 13px;
            word-break: break-all;
            font-family: monospace;
        }
        .detail-panel .field.full { grid-column: 1 / -1; }
        .detail-panel .field .f-value.error { color: var(--red); }
        .detail-panel .field .f-value.success { color: var(--green); }

        /* 子步骤表格 */
        .steps-table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
        }
        .steps-table th {
            background: #1c2128;
            color: var(--text-muted);
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }
        .steps-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .steps-table .step-done { color: var(--green); }
        .steps-table .step-failed { color: var(--red); }
        .steps-table .step-skipped { color: var(--text-muted); }
        .steps-table .step-icon { font-size: 16px; margin-right: 4px; }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            width: 500px;
            max-width: 90%;
        }
        .modal-content h2 { margin-bottom: 20px; color: var(--blue); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 13px; color: var(--text-muted); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
        }
        .form-group textarea { height: 80px; resize: vertical; font-family: monospace; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .detail-panel { grid-template-columns: 1fr; }
            .lifecycle { flex-direction: column; align-items: flex-start; }
            .lifecycle .arrow { transform: rotate(90deg); margin: 0; padding: 0 6px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ TaskScheduler 控制台</h1>
            <p>点击任务行展开查看完整生命周期</p>
        </header>

        <!-- 统计卡片 -->
        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="label">累计分发</div>
                <div class="value blue" id="stat-dispatched">-</div>
            </div>
            <div class="stat-card">
                <div class="label">运行中</div>
                <div class="value yellow" id="stat-running">-</div>
            </div>
            <div class="stat-card">
                <div class="label">已完成</div>
                <div class="value green" id="stat-completed">-</div>
            </div>
            <div class="stat-card">
                <div class="label">已失败</div>
                <div class="value red" id="stat-failed">-</div>
            </div>
            <div class="stat-card">
                <div class="label">队列待处理</div>
                <div class="value purple" id="stat-queue">-</div>
            </div>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <button class="btn btn-primary" onclick="openModal()">+ 新建任务</button>
            <a class="btn" href="/swagger" target="_blank" style="text-decoration:none;">📖 API文档</a>
            <a class="btn" href="/api/error-log" target="_blank" style="text-decoration:none;">📋 错误日志</a>
            <button class="btn" onclick="refreshData()">🔄 刷新</button>
            <label style="margin-left:12px;color:var(--text-muted);font-size:13px;">租户:</label>
            <input type="text" id="namespace-select" value="default" onchange="onNsChange()"
                   style="width:100px;padding:6px 10px;background:var(--card-bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;" placeholder="default">
            <span style="margin-left:auto;color:var(--text-muted);font-size:13px;" id="last-update"></span>
        </div>

        <!-- 任务列表 -->
        <table class="task-table">
            <thead>
                <tr>
                    <th style="width:30px;"></th>
                    <th>任务ID</th>
                    <th>名称</th>
                    <th>类型</th>
                    <th>状态</th>
                    <th>重试</th>
                    <th>创建时间</th>
                    <th style="width:40px;"></th>
                </tr>
            </thead>
            <tbody id="task-list">
                <tr><td colspan="7" style="text-align:center;color:var(--text-muted);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 新建任务模态框 -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <h2>新建任务</h2>
            <div class="form-group">
                <label>任务名称 *</label>
                <input type="text" id="task-name" placeholder="例如：HTTP回调-获取IP">
            </div>
            <div class="form-group">
                <label>任务类型 *</label>
                <select id="task-type">
                    <option value="http_call">http_call — HTTP请求</option>
                    <option value="data_clean">data_clean — 清理过期任务</option>
                    <option value="flash_warmup">flash_warmup — 秒杀预热检查(3步)</option>
                    <option value="cart_flow">cart_flow — 购物车全链路(5步)</option>
                    <option value="flash_full_check">flash_full_check — 秒杀全链路(6步)</option>
                    <option value="order_flow">order_flow — 下单全链路(5步)</option>
                    <option value="user_flow">user_flow — 用户注册登录(3步)</option>
                    <option value="admin_crud">admin_crud — 后台管理CRUD(5步)</option>
                </select>
            </div>
            <div class="form-group">
                <label>负载数据 (JSON)</label>
                <textarea id="task-payload" placeholder='{"url":"https://httpbin.org/ip","method":"GET"}'></textarea>
            </div>
            <div class="form-group">
                <label>延迟执行 (秒)</label>
                <input type="number" id="task-delay" value="0" min="0">
            </div>
            <div class="form-group">
                <label>最大重试次数</label>
                <input type="number" id="task-retry" value="3" min="0" max="10">
            </div>
            <div class="form-group">
                <label>超时时间 (秒)</label>
                <input type="number" id="task-timeout" value="30" min="1" max="300">
            </div>
            <div class="form-actions">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="createTask()">创建任务</button>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';

        // 修复：API Key 通过后端轻量级配置接口获取，不再硬编码
        // 如果后端未配置 API_KEY 环境变量，返回空字符串（跳过鉴权）
        var cachedApiKey = null;
        function getApiKey() {
            if (cachedApiKey !== null) return cachedApiKey;
            // 同步获取初始值（从 meta 标签或 cookie 中读取，避免额外的异步请求）
            var meta = document.querySelector('meta[name="api-key"]');
            cachedApiKey = meta ? meta.content : '';
            return cachedApiKey;
        }

        let currentNamespace = 'default';

        function onNsChange() {
            currentNamespace = document.getElementById('namespace-select').value || 'default';
            taskCache = {};  // 切换租户时清缓存
            refreshData();
        }

        function getNsHeaders() {
            var h = {};
            var key = getApiKey();
            if (key) h['X-API-Key'] = key;
            h['X-Namespace'] = currentNamespace;
            return h;
        }

        let expandedTaskId = null;  // 记住当前展开的任务，刷新时保持展开

        // 从 URL 参数自动展开指定任务（Swagger 跳转过来时使用）
        var urlParams = new URLSearchParams(window.location.search);
        var taskFromUrl = urlParams.get('task');
        if (taskFromUrl) {
            expandedTaskId = taskFromUrl;
        }

        // 页面加载时首次刷新，然后每2秒自动刷新
        refreshData();
        setInterval(refreshData, 2000);

        function refreshData() {
            fetch(API + '/stats').then(r => r.json()).then(updateStats).catch(console.error);
            fetch(API + '/tasks', { headers: getNsHeaders() }).then(r => r.json()).then(updateTaskList).catch(console.error);
            document.getElementById('last-update').textContent = '最后更新: ' + new Date().toLocaleTimeString();
        }

        function updateStats(data) {
            document.getElementById('stat-dispatched').textContent = data.dispatched || 0;
            document.getElementById('stat-running').textContent = data.running || 0;
            const pool = data.pool || {};
            document.getElementById('stat-completed').textContent = pool.completed || 0;
            document.getElementById('stat-failed').textContent = pool.failed || 0;
            document.getElementById('stat-queue').textContent = pool.queue_len || 0;
        }

        function updateTaskList(data) {
            const tasks = data.tasks || [];
            const tbody = document.getElementById('task-list');
            if (tasks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);">暂无任务</td></tr>';
                expandedTaskId = null;
                return;
            }
            // 缓存任务数据（供复制诊断报告用）
            tasks.forEach(function(t) { taskCache[t.id] = t; });
            // 按任务 ID 排序（task-1, task-2... 位置固定不变）
            tasks.sort((a, b) => {
                const na = parseInt(a.id.split('-')[1]) || 0;
                const nb = parseInt(b.id.split('-')[1]) || 0;
                return na - nb;
            });
            tbody.innerHTML = tasks.map(t => {
                const statusText = getStatusText(t.status);
                return `
                <tr class="task-row" onclick="toggleDetail(this, '${t.id}')" title="点击展开/收起详情">
                    <td><span class="expand-icon">▶</span></td>
                    <td><code>${t.id}</code></td>
                    <td>${escHtml(t.name)}</td>
                    <td>${t.type}</td>
                    <td><span class="status status-${t.status}">${statusText}</span></td>
                    <td>${t.retries || 0}/${t.max_retries || 0}</td>
                    <td>${formatTime(t.created_at)}</td>
                    <td><button class="btn" style="padding:2px 8px;font-size:11px;border-color:var(--red);color:var(--red);" onclick="event.stopPropagation();deleteTask('${t.id}')" title="删除任务">✕</button></td>
                </tr>
                <tr class="detail-row" id="detail-${t.id}">
                    <td colspan="8">${buildDetail(t)}</td>
                </tr>
                `;
            }).join('');
            // 恢复之前展开的任务
            restoreExpanded();
        }

        function getStatusText(s) {
            const map = { pending:'等待中', running:'执行中', done:'已完成', failed:'已失败', timeout:'已超时', retrying:'重试中' };
            return map[s] || s;
        }

        function buildStepsTable(t) {
            const steps = t.steps || [];
            if (steps.length === 0) return '';
            return `
                <div style="margin: 12px 0;">
                    <div style="font-size:13px;color:var(--text-muted);margin-bottom:6px;">执行步骤</div>
                    <table class="steps-table">
                        <thead><tr><th>状态</th><th>步骤</th><th>耗时</th><th>结果/错误</th></tr></thead>
                        <tbody>${steps.map(s => {
                            let icon, cls;
                            if (s.status === 'done') { icon = '✅'; cls = 'step-done'; }
                            else if (s.status === 'failed') { icon = '❌'; cls = 'step-failed'; }
                            else { icon = '⏭'; cls = 'step-skipped'; }
                            const detail = s.status === 'failed' ? escHtml(s.error) : escHtml(s.result || '-');
                            const ms = s.duration_ms ? s.duration_ms + 'ms' : '-';
                            return `<tr class="${cls}">
                                <td><span class="step-icon">${icon}</span></td>
                                <td>${escHtml(s.name)}</td>
                                <td>${ms}</td>
                                <td>${detail}</td>
                            </tr>`;
                        }).join('')}</tbody>
                    </table>
                </div>`;
        }

        function buildDetail(t) {
            // 生命周期时间线
            const steps = buildLifecycle(t);
            // 详情字段
            const stepsTable = buildStepsTable(t);
            return `
                <div style="padding: 8px 0;">
                    <div class="lifecycle">${steps}</div>
                    ${stepsTable}
                    <div class="detail-panel">
                        <div class="field">
                            <div class="f-label">任务 ID</div>
                            <div class="f-value">${t.id}</div>
                        </div>
                        <div class="field">
                            <div class="f-label">任务类型</div>
                            <div class="f-value">${t.type}</div>
                        </div>
                        <div class="field full">
                            <div class="f-label">Payload</div>
                            <div class="f-value">${escHtml(fmtPayload(t.payload))}</div>
                        </div>
                        ${t.result ? `
                        <div class="field full">
                            <div class="f-label">执行结果</div>
                            <div class="f-value success">${escHtml(truncate(t.result, 500))}</div>
                        </div>` : ''}
                        ${t.error ? `
                        <div class="field full">
                            <div class="f-label">错误信息</div>
                            <div class="f-value error">${escHtml(t.error)}</div>
                        </div>` : ''}
                        <div class="field">
                            <div class="f-label">创建时间</div>
                            <div class="f-value">${formatTime(t.created_at)}</div>
                        </div>
                        <div class="field">
                            <div class="f-label">计划执行</div>
                            <div class="f-value">${formatTime(t.scheduled_at)}</div>
                        </div>
                        <div class="field">
                            <div class="f-label">开始执行</div>
                            <div class="f-value">${formatTime(t.started_at)}</div>
                        </div>
                        <div class="field">
                            <div class="f-label">完成时间</div>
                            <div class="f-value">${formatTime(t.finished_at)}</div>
                        </div>
                    </div>
                    <div style="margin-top:12px;display:flex;gap:8px;">
                        <button class="btn" style="font-size:12px;padding:4px 12px;" onclick="event.stopPropagation();copyDiagnosis('${t.id}')">📋 复制诊断报告</button>
                        <a class="btn" style="font-size:12px;padding:4px 12px;text-decoration:none;" href="/api/error-log" target="_blank">📂 查看错误日志</a>
                    </div>
                </div>
            `;
        }

        // 全局任务缓存（用于复制诊断报告）
        var taskCache = {};

        function buildLifecycle(t) {
            // 根据实际状态确定每个阶段的样式
            const isDone = t.status === 'done';
            const isFailed = t.status === 'failed' || t.status === 'timeout';
            const isRunning = t.status === 'running';
            const isRetrying = t.status === 'retrying';
            const isPending = t.status === 'pending';

            // 每个阶段的状态
            const createdOk = true;
            const scheduledOk = !isZeroTime(t.scheduled_at);
            const startedOk = !!t.started_at;
            const finishedOk = !!t.finished_at;

            // 根据实际执行情况决定每个 dot 的样式
            function dotClass(ok, isFinalFail) {
                if (!ok) return '';
                if (isFinalFail) return 'fail';
                return 'done';
            }

            function arrowClass(ok) { return ok ? 'passed' : ''; }

            const steps = [
                { label: '已创建', time: t.created_at, ok: true },
                { label: '已调度', time: t.scheduled_at, ok: scheduledOk },
                { label: '执行中', time: t.started_at, ok: startedOk },
                { label: isFailed ? '失败' : isRunning ? '执行中' : isRetrying ? '重试中' : isPending ? '等待中' : '完成',
                  time: t.finished_at,
                  ok: finishedOk,
                  finalFail: isFailed },
            ];

            let html = '';
            for (let i = 0; i < steps.length; i++) {
                const s = steps[i];
                let dc = '';
                if (s.ok) {
                    dc = s.finalFail ? 'fail' : 'done';
                } else if (i === steps.length - 1 && (isRunning || isPending)) {
                    dc = 'active';
                } else if (i === steps.length - 1 && isRetrying) {
                    dc = 'warn';
                }

                html += `<div class="step">
                    <div class="dot ${dc}"></div>
                    <div class="label">${s.label}</div>
                    <div class="time">${formatTime(s.time)}</div>
                </div>`;
                if (i < steps.length - 1) {
                    // arrow color based on whether we passed this stage
                    const arrowOk = i < 2 ? (i === 0 ? createdOk : scheduledOk) : startedOk;
                    html += `<div class="arrow ${arrowOk ? 'passed' : ''}">→</div>`;
                }
            }
            return html;
        }

        function isZeroTime(t) {
            if (!t) return true;
            const d = new Date(t);
            return d.getFullYear() <= 1;
        }

        function fmtPayload(p) {
            if (!p) return '-';
            try { return JSON.stringify(JSON.parse(p), null, 2); } catch(e) { return p; }
        }

        function truncate(s, n) {
            if (!s) return '';
            return s.length > n ? s.substring(0, n) + '...' : s;
        }

        function toggleDetail(row, id) {
            const detailRow = document.getElementById('detail-' + id);
            if (!detailRow) return;
            const isOpen = detailRow.classList.contains('show');
            if (!isOpen) {
                // 关闭其他展开行
                document.querySelectorAll('.detail-row.show').forEach(r => r.classList.remove('show'));
                document.querySelectorAll('.task-row.expanded').forEach(r => r.classList.remove('expanded'));
                detailRow.classList.add('show');
                row.classList.add('expanded');
                expandedTaskId = id;
            } else {
                detailRow.classList.remove('show');
                row.classList.remove('expanded');
                expandedTaskId = null;
            }
        }

        // 刷新后恢复之前展开的任务
        function restoreExpanded() {
            if (!expandedTaskId) return;
            const detailRow = document.getElementById('detail-' + expandedTaskId);
            if (detailRow) {
                detailRow.classList.add('show');
                // 找到对应的 task-row
                const taskRow = detailRow.previousElementSibling;
                if (taskRow && taskRow.classList.contains('task-row')) {
                    taskRow.classList.add('expanded');
                }
            } else {
                expandedTaskId = null; // 任务可能已被删除
            }
        }

        function createTask() {
            const payload = {
                name: document.getElementById('task-name').value,
                type: document.getElementById('task-type').value,
                payload: document.getElementById('task-payload').value,
                delay: parseInt(document.getElementById('task-delay').value) || 0,
                max_retries: parseInt(document.getElementById('task-retry').value) || 3,
                timeout: parseInt(document.getElementById('task-timeout').value) || 30,
            };

            if (!payload.name || !payload.type) {
                alert('请填写任务名称和类型');
                return;
            }

            var hdrs = getNsHeaders();
            hdrs['Content-Type'] = 'application/json';
            fetch(API + '/tasks', {
                method: 'POST',
                headers: hdrs,
                body: JSON.stringify(payload),
            }).then(r => r.json()).then(data => {
                if (data.error) {
                    alert('创建失败: ' + data.error);
                } else {
                    closeModal();
                    refreshData();
                }
            }).catch(err => alert('请求失败: ' + err));
        }

        function openModal() { document.getElementById('createModal').classList.add('active'); }
        function copyDiagnosis(id) {
            var t = taskCache[id];
            if (!t) { alert('任务数据未加载'); return; }
            var statusMap = {pending:'等待中',running:'执行中',done:'已完成',failed:'已失败',timeout:'超时',retrying:'重试中'};
            var report = [
                '## 任务诊断报告',
                '',
                '| 字段 | 值 |',
                '|---|---|',
                '| 任务ID | ' + t.id + ' |',
                '| 任务名称 | ' + t.name + ' |',
                '| 任务类型 | ' + t.type + ' |',
                '| 当前状态 | ' + (statusMap[t.status] || t.status) + ' |',
                '| 重试次数 | ' + (t.retries||0) + '/' + (t.max_retries||0) + ' |',
                '| 创建时间 | ' + formatTime(t.created_at) + ' |',
                '| 开始时间 | ' + formatTime(t.started_at) + ' |',
                '| 完成时间 | ' + formatTime(t.finished_at) + ' |',
                t.error ? '| 错误信息 | `' + t.error + '` |' : '',
                t.result ? '| 执行结果 | ' + t.result.substring(0,200) + ' |' : '',
                '',
                '### Payload',
                '```json',
                fmtPayload(t.payload),
                '```',
            ];
            if (t.steps && t.steps.length > 0) {
                report.push('', '### 子步骤详情', '');
                report.push('| 状态 | 步骤 | 耗时 | 结果 |');
                report.push('|---|---|---|---|');
                t.steps.forEach(function(s) {
                    var icon = s.status === 'done' ? '✅' : s.status === 'failed' ? '❌' : '⏭';
                    report.push('| ' + icon + ' | ' + s.name + ' | ' + (s.duration_ms||'?') + 'ms | ' + (s.error || s.result || '-') + ' |');
                });
            }
            // 定位提示：帮助 AI 快速找到对应代码
            report.push('', '### 定位信息', '');
            report.push('- 调度系统路径: `<项目根目录>`');
            report.push('- Runner 代码: `worker/runner.go` → `' + t.type + 'Runner` 函数');
            report.push('- 错误日志: `logs/error.log`（JSON 行格式）');
            report.push('- 存储后端: MySQL `task_scheduler.tasks` 表');
            if (t.type === 'flash_warmup') report.push('- 涉及系统: 电商系统，管理员凭据通过环境变量配置');
            if (t.type === 'cart_flow') report.push('- 涉及系统: 电商系统，购物车+MySQL验证');
            if (t.type === 'http_call') report.push('- 纯 HTTP 请求，检查目标 URL 是否可达');

            var text = report.join('\n');
            navigator.clipboard.writeText(text).then(function() {
                alert('诊断报告已复制到剪贴板，可直接粘贴给 AI 分析');
            }).catch(function() {
                prompt('手动复制以下报告（Ctrl+C）：', text);
            });
        }

        function deleteTask(id) {
            if (!confirm('确认删除任务 ' + id + '？')) return;
            fetch(API + '/tasks/' + id, {
                method: 'DELETE',
                headers: getNsHeaders()
            }).then(function(r) {
                if (r.ok) { refreshData(); }
                else { alert('删除失败: ' + r.status); }
            }).catch(function(e) { alert('请求失败: ' + e); });
        }

        function closeModal() { document.getElementById('createModal').classList.remove('active'); }

        function formatTime(t) {
            if (!t) return '-';
            const d = new Date(t);
            if (d.getFullYear() <= 1) return '-';
            return d.toLocaleString('zh-CN');
        }

        function escHtml(s) {
            const el = document.createElement('div');
            el.textContent = s;
            return el.innerHTML;
        }
    </script>
</body>
</html>
